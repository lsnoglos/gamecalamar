<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Runner - Luz Roja / Luz Verde</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <header class="hud-top">
        <div class="hud-block">
          <span class="hud-label">Tiempo</span>
          <strong id="time-left">150</strong>
        </div>
        <div class="hud-block state" id="game-state" data-state="safe">LUZ VERDE</div>
        <div class="hud-block">
          <span class="hud-label">Jugando</span>
          <strong id="alive-count">0</strong>
        </div>
      </header>

      <section class="scene-layout">
        <aside class="hud-ranking">
          <div class="ranking-head">
            <h2>Ranking</h2>
          </div>
          <section class="ranking-section">
            <h3>Top 10 del día</h3>
            <ol id="ranking-list"></ol>
          </section>
          <section class="ranking-section monthly">
            <h3>Top 3 del mes</h3>
            <ol id="monthly-ranking-list"></ol>
          </section>
          <div class="ranking-message" id="ranking-message">Corre… ahora…</div>
          <div class="join-tip">Escribe <strong>Jugar</strong> para unirte al juego.</div>
        </aside>

        <main class="game-viewport">
          <div class="level-badge" id="level-badge">
            <span class="level-pyramid" aria-hidden="true">▲</span>
            <strong id="level-label">Nivel 1</strong>
          </div>
          <canvas id="game-canvas" width="540" height="960"></canvas>
          <div class="flash" id="flash-overlay"></div>
          <div class="float-layer" id="float-layer"></div>
          <div class="alert-text" id="alert-text" data-tone="neutral">No te muevas…</div>
        </main>
      </section>

      <footer class="control-panel">
        <div class="gift-list">
          <strong>Regalos</strong>
          <div class="gift-buttons">
            <button class="gift-btn" data-gift="rosa">🌹 Rosa (+1)</button>
            <button class="gift-btn" data-gift="dona">🍩 Dona (+5)</button>
            <button class="gift-btn" data-gift="dance">💃 Baile (20s)</button>
            <button class="gift-btn" data-gift="freeze">❄️ Congelar (10s)</button>
            <button class="gift-btn" data-gift="pause">⏸️ Pausa (20s)</button>
            <button class="gift-btn" data-gift="mass">💥 Explosión</button>
          </div>
        </div>
        <div class="test-controls">
          <button id="play-btn" class="mini-btn">▶</button>
          <button id="spawn-btn" class="mini-btn">＋</button>
          <button id="tap-btn" class="mini-btn">👆</button>
          <button id="auto-tap-btn" class="mini-btn">Auto</button>
        </div>
      </footer>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
