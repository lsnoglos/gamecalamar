<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Runner - Luz Roja / Luz Verde</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <header class="hud-top">
        <div class="hud-block">
          <span class="hud-label">Tiempo</span>
          <strong id="time-left">120</strong>
        </div>
        <div class="hud-block state" id="game-state" data-state="safe">LUZ VERDE</div>
        <div class="hud-block">
          <span class="hud-label">Jugando</span>
          <strong id="alive-count">0</strong>
        </div>
      </header>

      <section class="scene-layout">
        <aside class="hud-ranking">
          <div class="ranking-head">
            <h2>Ranking</h2>
          </div>
          <section class="ranking-section">
            <h3>Top 10 del día</h3>
            <div class="ranking-table-head">
              <span>LVL</span>
              <span>Jugador</span>
              <span>#</span>
            </div>
            <ol id="ranking-list" class="ranking-table"></ol>
          </section>
          <section class="ranking-section monthly">
            <h3>Top 3 del mes</h3>
            <ol id="monthly-ranking-list"></ol>
          </section>
          <div class="ranking-message" id="ranking-message">Corre… ahora…</div>
          <div class="join-tip"><span class="join-tip-callout">Escribe <strong>Jugar</strong> para unirte al juego.</span></div>
        </aside>

        <main class="game-viewport">
          <div class="level-badge" id="level-badge">
            <span class="level-pyramid" aria-hidden="true">▲</span>
            <strong id="level-label">Nivel 1</strong>
          </div>
          <canvas id="game-canvas" width="540" height="960"></canvas>
          <div class="flash" id="flash-overlay"></div>
          <div class="float-layer" id="float-layer"></div>
          <div class="alert-text" id="alert-text" data-tone="neutral">No te muevas…</div>
        </main>
      </section>

      <footer class="control-panel">
        <div class="tap-echo-line" aria-live="polite">
          <span class="tap-echo-text">Dale tap tap a la pantalla...</span>
        </div>
        <div class="gift-list">
          <strong>Regalos:</strong>
          <div class="gift-buttons gift-buttons-gifts">
            <button class="gift-btn" data-gift="rosa">🌹 +1 escudo protector</button>
            <button class="gift-btn" data-gift="corazon">💖 Congelar todo</button>
            <button class="gift-btn" data-gift="gorra">🧢 Todos al inicio</button>
          </div>
          <div class="gift-chat-hint">Escribe:</div>
          <div class="gift-buttons gift-buttons-chat">
            <button class="gift-btn" data-trigger="chat" data-message="lanza misil a la muñeca">🚀 Lanza Misil a la muñeca</button>
            <button class="gift-btn" data-trigger="chat" data-message="pon a bailar a la muñeca">💃 Pon a bailar a la muñeca</button>
          </div>
        </div>
        <div class="test-controls">
          <button id="play-btn" class="mini-btn">▶</button>
          <button id="spawn-btn" class="mini-btn">＋</button>
          <button id="tap-btn" class="mini-btn">👆</button>
          <button id="auto-tap-btn" class="mini-btn">Auto</button>
        </div>
      </footer>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
